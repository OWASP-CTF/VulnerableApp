# ─────────────────────────────────────────────────────────────────────────────
# PASTE-READY consumer workflow for a VulnerableApp CTF fork.
# Copy this into the VulnerableApp fork as: .github/workflows/ctf-score.yml
#
# VulnerableApp is a Spring Boot app served at /VulnerableApp on :9090. It needs
# NO database, but it DOES need an `ollama` sidecar on `ctfnet`: three exploit
# tests (RFI-Level-1/2, SSRF-Level-4) prove RFI/SSRF by reaching an internal-only
# HTTP service at http://ollama:11434/ and matching its "Ollama is running" root
# response. Without the sidecar those three score open (113/116); with it, 116/116.
#
# Prerequisites:
#   - Disable inherited upstream workflows on the fork so only this ctf-score
#     job runs (see ../vulnerableapp-consumer/README.md).
#   - ghcr.io/owasp-ctf/score is PRIVATE; the VulnerableApp fork has been granted
#     Read access so this job's GITHUB_TOKEN can pull it (see README.md step 2).
#     Do NOT make it public.
#
# DESIGN — the scorer image is self-contained: the VulnerableApp challenge rubric
# (regression tests) is baked into the binary, so `score --target vulnerableapp
# --url http://app:9090/VulnerableApp` is passed with NO --dir flags. Scoring is
# purely behavioral — no source mount is needed.
#
# SECURITY — pull_request_target runs with the BASE repo's GITHUB_TOKEN while
# the PR is UNTRUSTED code. The `score` job (the only one that touches PR code)
# holds no write scopes, builds + runs the PR's app on an --internal Docker
# network with NO docker socket, NO secrets, and NO mounted test files, and
# uploads only the rendered table. The privileged `comment` job
# (pull-requests: write) runs NONE of the PR's code.
# ─────────────────────────────────────────────────────────────────────────────
name: ctf-score

on:
  pull_request_target:
    branches: [master]
    types: [opened, synchronize, reopened]

concurrency:
  group: ctf-score-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# No ambient permissions — each job opts into the minimum it needs.
permissions: {}

env:
  SCORER_IMAGE: ghcr.io/owasp-ctf/score:latest

jobs:
  # Fast feedback that the run started. Posts a placeholder under the SAME marker the `ack` job
  # uses, so `ack` overwrites it in place with the result — the PR ends with one comment, not a
  # thread. Without this, a contestant stares at a silent PR for the many minutes scoring takes.
  # Runs in parallel with `score` (nothing blocks on it) and NEVER runs the PR's code.
  pending:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Upsert the "scoring in progress" comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- ctf-score-ack -->';
            const sha = (context.payload.pull_request.head.sha || '').slice(0, 7);
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `${marker}\n⏳ **Scoring your patch…**\n\n`
              + `Hang tight — we're building your app and running the full challenge rubric against it. `
              + `This takes a few minutes. This comment will update itself with your result as soon as the `
              + `[scoring run](${run}) finishes — no need to do anything.\n\n`
              + `Commit: \`${sha}\``;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  # Builds + runs the UNTRUSTED PR app sandboxed, then scores it. No write scopes.
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    outputs:
      # The sidecar crosses to `publish` as a job OUTPUT, never an artifact: this fork is
      # PUBLIC, and Actions artifacts are downloadable by any GitHub user, so an uploaded
      # ctf-score.json would hand every competitor the list of solved challenges. Job outputs
      # are not printed in the log and are not exposed through the REST API.
      sidecar: ${{ steps.score.outputs.sidecar }}
    steps:
      - name: Check out the PR head (untrusted — used only to docker build the app)
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Log in to GHCR (pull the private scorer image)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull the private scorer image
        run: docker pull "$SCORER_IMAGE"

      # Pull the ollama image BEFORE creating the internal network — the host daemon
      # needs internet to fetch it; the container itself runs with no egress on ctfnet.
      - name: Pull the ollama sidecar image
        run: docker pull docker.io/ollama/ollama:latest

      # VulnerableApp has NO root Dockerfile — it's a Gradle (Java 17) project that builds its app
      # image with the jib plugin. `jibDockerBuild` assembles the image straight into the local
      # docker daemon (no registry push), overriding the target name to ctf-app:pr.
      - name: Set up JDK 17 (VulnerableApp build toolchain)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Build the PR's app image (Gradle jib -> local docker, no secrets/build-args)
        run: |
          chmod +x gradlew
          ./gradlew jibDockerBuild --image=ctf-app:pr

      - name: Create an isolated, internet-less network
        run: docker network create --internal ctfnet

      # Internal-only service the RFI/SSRF exploits target. Its root path returns
      # "Ollama is running" with no model loaded and no internet — a bare container
      # on the network is all the three exploit tests need.
      - name: Start the ollama sidecar on the internal network
        run: docker run -d --name ollama --network ctfnet docker.io/ollama/ollama:latest

      # The active `public` Spring profile maps the H2 admin/app datasource credentials to env vars
      # (DB_ADMIN_*/DB_APP_*). Unset, the admin datasource can't init, so the schema/data SQL never
      # runs and the cars/users tables stay empty — making the data-dependent SQLi (Blind/Union/Auth)
      # silently unexploitable. The app user's password is hardcoded to 'hacker' in the schema
      # (`CREATE USER application PASSWORD 'hacker'`), so these values must match.
      - name: Start the VulnerableApp sandboxed (jib-built PR image)
        run: |
          docker run -d --name app --network ctfnet \
            -e DB_ADMIN_USERNAME=admin -e DB_ADMIN_PASSWORD=hacker \
            -e DB_APP_USERNAME=application -e DB_APP_PASSWORD=hacker \
            ctf-app:pr

      # Wait for VulnerableApp to be healthy AND for its data to be SEEDED. VulnerableApp's
      # DatabaseSeeder runs on ApplicationReadyEvent — i.e. AFTER the web server starts serving —
      # so /allEndPointJson returns 200 before the cars/users tables are populated. Scoring during
      # that window makes the data-dependent SQLi (blind boolean, UNION exfil, auth bypass) return
      # nothing and falsely look "patched". So we additionally poll a SEEDED row
      # (UnionBasedSQLInjectionVulnerability/LEVEL_1?id=1 -> the "Audi" car) and only proceed once it
      # appears. Run via the scorer container on ctfnet (score image delegates to Node under
      # `--entrypoint node`), with a per-request timeout so a slow/broken app fails fast.
      - name: Wait for VulnerableApp to become healthy and seeded
        run: |
          docker run --rm --entrypoint node --network ctfnet "$SCORER_IMAGE" -e '
            const B = "http://app:9090/VulnerableApp";
            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
            const get = (u) => fetch(u, { signal: AbortSignal.timeout(8000) });
            (async () => {
              let up = false;
              for (let i = 0; i < 60; i++) {
                try { if ((await get(B + "/allEndPointJson")).ok) { up = true; break; } } catch {}
                await sleep(3000);
              }
              if (!up) { console.error("VulnerableApp never served a healthy /allEndPointJson"); process.exit(2); }
              // Gate on the seed completing: a known car row must be queryable.
              for (let i = 0; i < 40; i++) {
                try {
                  const r = await get(B + "/UnionBasedSQLInjectionVulnerability/LEVEL_1?id=1");
                  if (r.ok && /Audi/.test(await r.text())) { console.log("VulnerableApp ready + seeded after " + i + " probe(s)"); process.exit(0); }
                } catch {}
                await sleep(3000);
              }
              console.error("VulnerableApp endpoints up but data never seeded (no Audi row)"); process.exit(3);
            })();
          '

      - name: Dump app + ollama logs if VulnerableApp never came up
        if: failure()
        run: |
          echo "::group::app logs";    docker logs app    2>&1 | tail -60 || true; echo "::endgroup::"
          echo "::group::ollama logs"; docker logs ollama 2>&1 | tail -30 || true; echo "::endgroup::"

      - name: Score the patched VulnerableApp (embedded rubric)
        id: score
        run: |
          mkdir -p "$PWD/score-out"
          rc=0
          # ENTRYPOINT is the score binary, so pass ONLY its args (no leading `score`).
          docker run --rm --network ctfnet \
            -e GITHUB_WORKSPACE=/out -v "$PWD/score-out:/out" -w /out \
            "$SCORER_IMAGE" --quiet --target vulnerableapp --url http://app:9090/VulnerableApp || rc=$?
          if [ "$rc" -ge 125 ]; then echo "::error::scorer failed (exit $rc)"; exit "$rc"; fi
          echo "Scorer finished: $rc challenge(s) still open."

          # Hand the sidecar to the privileged `publish` job WITHOUT uploading it anywhere a
          # contestant can read. Base64 keeps it to one line for $GITHUB_OUTPUT.
          if [ -s "$PWD/score-out/ctf-score.json" ]; then
            echo "sidecar=$(base64 < "$PWD/score-out/ctf-score.json" | tr -d '\n')" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop containers
        if: always()
        run: docker rm -f app ollama 2>/dev/null || true

  # Writes the score to the Upstash leaderboard from inside the scoring image. Isolated like
  # `comment`: NEVER checks out / builds / runs PR code, has internet (default network, NOT
  # ctfnet), and is the ONLY job that sees the Upstash secret. Best-effort: never fails the PR.
  publish:
    needs: score
    if: always()
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      pushed: ${{ steps.push.outputs.pushed }}
    steps:
      - name: Log in to GHCR (pull the private scorer image)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull the private scorer image
        run: docker pull "$SCORER_IMAGE"

      - name: Materialise the score sidecar from the score job's output
        # Via env, NOT inline ${{ }} interpolation into the shell — the value is produced on the
        # runner that built the PR's Dockerfile, so it is treated as untrusted input.
        env:
          SIDECAR: ${{ needs.score.outputs.sidecar }}
        run: |
          mkdir -p score-out
          if [ -n "$SIDECAR" ]; then
            printf '%s' "$SIDECAR" | base64 -d > score-out/ctf-score.json
          else
            echo "No sidecar from the score job — nothing to publish."
          fi

      - name: Push the score to the Upstash leaderboard
        id: push
        # No --network ctfnet: this run needs internet and never touches the PR app. The Upstash
        # secret is materialised ONLY here, in a job that runs no contestant code. Team identity
        # comes from the GitHub event (not PR code), so it cannot be forged.
        env:
          CTF_UPSTASH_REDIS_REST_URL: ${{ secrets.CTF_UPSTASH_REDIS_REST_URL }}
          CTF_UPSTASH_REDIS_REST_TOKEN: ${{ secrets.CTF_UPSTASH_REDIS_REST_TOKEN }}
          CTF_TEAM: ${{ github.event.pull_request.user.login }}
          CTF_PR: ${{ github.event.pull_request.number }}
          CTF_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ -z "$CTF_UPSTASH_REDIS_REST_URL" ]; then
            echo "No Upstash config — leaderboard push disabled."; exit 0
          fi
          # GITHUB_WORKSPACE=/out tells the scorer where to find ctf-score.json
          out=$(docker run --rm \
            -e GITHUB_WORKSPACE=/out -v "$PWD/score-out:/out" -w /out \
            -e CTF_UPSTASH_REDIS_REST_URL -e CTF_UPSTASH_REDIS_REST_TOKEN \
            -e CTF_TEAM -e CTF_PR -e CTF_SHA \
            "$SCORER_IMAGE" score --push)
          echo "$out"
          # ACK gate: the scorer prints "leaderboard updated for <team>" only on a successful
          # ZADD — so a skip (no team) or a swallowed HTTP error won't trigger a false ACK.
          if printf '%s' "$out" | grep -q "leaderboard updated for"; then
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

  # Resolve the placeholder `pending` posted (same marker → updated in place). Leak-safe:
  # confirms the submission landed WITHOUT the score table (which would reveal which challenges
  # are solved). Runs even when the score or the leaderboard push failed, so the "⏳ Scoring…"
  # placeholder is always replaced by a real outcome instead of hanging forever. Skipped only on
  # cancellation — a superseding push cancels this run, and its own `pending` job immediately
  # rewrites the comment. NEVER runs the PR's code.
  ack:
    needs: [score, publish]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Upsert the leaderboard ACK comment
        uses: actions/github-script@v7
        env:
          PUSHED: ${{ needs.publish.outputs.pushed }}
          SCORE_RESULT: ${{ needs.score.result }}
        with:
          script: |
            const marker = '<!-- ctf-score-ack -->';
            const sha = (context.payload.pull_request.head.sha || '').slice(0, 7);
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            // Three outcomes, not two. The scorer SKIPS the leaderboard write when a PR solves
            // nothing (`leaderboard push skipped (no-solves)`), so an empty PUSHED is the normal
            // result of a healthy run that simply scored zero — not an error. Only a `score` job
            // that did not succeed is a real failure.
            let headline, detail;
            if (process.env.SCORE_RESULT !== 'success') {
              headline = '⚠️ **Scoring did not complete**';
              detail = `We couldn't score this commit \u2014 your app may have failed to build or boot. `
                + `Check the [scoring run](${run}) for details, then push a new commit to retry.`;
            } else if (process.env.PUSHED === 'true') {
              headline = '🎉 **Score recorded!**';
              detail = `Great work \u2014 your patch has been evaluated and your result is now on the `
                + `[leaderboard](https://ctf.owasp.org/leaderboard)! 🏆 Head over and see where you rank!`;
            } else {
              headline = '✅ **Scoring complete \u2014 no points yet**';
              detail = `Your app built and ran, and we scored it against the full challenge rubric \u2014 but `
                + `this commit didn't solve any challenges, so there's nothing to add to the `
                + `[leaderboard](https://ctf.owasp.org/leaderboard) yet. Patch a vulnerability and push again! 💪`;
            }
            const body = `${marker}\n${headline}\n\n${detail}\n\nCommit: \`${sha}\``;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

